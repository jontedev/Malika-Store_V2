{% extends "base.html" %}

{% block title %}
Edit Product | {{ APP_NAME }}
{% endblock %}

{% block content %}

<section class="page-content">

    <div class="container">

        <div class="admin-card fade-in">


            <div class="admin-header">

                <h4 class="mb-0">

                    <i class="bi bi-pencil-square me-2"></i>

                    Edit Product

                </h4>

            </div>



            <div class="card-body p-4">


                <form method="POST" enctype="multipart/form-data" data-validate>


                    <div class="mb-3">

                        <label class="form-label">

                            Product Name

                        </label>

                        <input

                            type="text"

                            name="name"

                            class="form-control"

                            value="{{ product[1] }}"

                            data-trim

                            required>

                    </div>



                    <div class="mb-3">

                        <label class="form-label">

                            Price (KSh)

                        </label>

                        <input

                            type="number"

                            name="price"

                            class="form-control"

                            value="{{ product[2] }}"

                            step="0.01"

                            min="0"

                            required>

                    </div>



                    <div class="mb-3">

                        <label class="form-label">

                            Description

                        </label>

                        <textarea

                            name="description"

                            class="form-control"

                            rows="4"

                            data-trim>{{ product[3] }}</textarea>

                    </div>



                    <div class="mb-3">

                        <label class="form-label">

                            Category

                        </label>

                        <input

                            type="text"

                            name="category"

                            class="form-control"

                            value="{{ product[5] }}"

                            data-trim>

                    </div>



                    <div class="mb-4">

                        <label class="form-label">

                            Product Image

                        </label>


                        {% if product[4] %}

                        <div class="current-image mb-3">

                            <img

                                src="{{ url_for('static', filename='images/products/' + product[4]) }}"

                                alt="Current product image"

                                class="product-preview">


                            <span class="text-muted">

                                Current image

                            </span>

                        </div>

                        {% endif %}



                        <input

                            type="file"

                            name="image"

                            class="form-control"

                            accept="image/*">


                        <small class="text-muted">

                            Leave empty to keep the current image.

                        </small>

                    </div>



                    <div class="d-flex flex-wrap gap-2">


                        <button

                            type="submit"

                            class="btn btn-danger">

                            <i class="bi bi-save-fill me-2"></i>

                            Save Changes

                        </button>



                        <a

                            href="{{ url_for('admin') }}"

                            class="btn btn-secondary">

                            <i class="bi bi-x-circle me-2"></i>

                            Cancel

                        </a>


                    </div>


                </form>


            </div>


        </div>

    </div>

</section>

{% endblock %}
